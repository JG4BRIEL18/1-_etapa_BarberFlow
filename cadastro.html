<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - BarberFlow</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

    <!-- Cabeçalho -->
    <header>

        <!-- Logo + título -->
        <a href="index.html" class="logo-area">
            <img src="logo.png" alt="Logo do BarberFlow">
            <h1>BarberFlow</h1>
        </a>

        <!-- Navegação -->
        <nav>
            <a href="index.html">Início</a>
            <a href="login.html">Login</a>
            <a href="cadastro.html">Cadastro</a>
        </nav>

        <!-- Botão dark mode -->
        <button id="darkToggle">Modo Noturno 🌙</button>

    </header>

    <!-- Conteúdo principal -->
    <main>


        <!-- CADASTRO -->
        <section class="form-container">
            <h2>Criar conta</h2>
            <form>
                <label for="nome">Nome completo</label>
                <input 
                type="text" 
                id="nome" 
                name="nome" 
                placeholder="Digite seu nome" 
                required 
                autocomplete="name">

                <label for="emailCadastro">Email</label>
                <input 
                type="email" 
                id="emailCadastro" 
                name="email" 
                placeholder="Digite seu email" 
                required 
                autocomplete="email">

                <label for="senhaCadastro">Senha</label>
                <input 
                type="password" 
                id="senhaCadastro" 
                name="senha" 
                placeholder="Crie uma senha"
                required
                minlength="8" 
                autocomplete="new-password">
                <small>Mínimo de 8 caracteres</small>

                <label for="confirmarSenha">Confirmar senha</label>
                <input 
                type="password" 
                id="confirmarSenha"
                name="confirmarSenha" 
                placeholder="Digite novamente a senha" 
                required 
                minlength="8" 
                autocomplete="new-password">
                <small>Digite a mesma senha novamente</small>

                <button type="submit">Cadastrar</button>
            </form>
        </section>

    </main>

    <!-- Rodapé -->
    <footer>
        <p><strong>BarberFlow</strong></p>
        <p>© 2026 BarberFlow - Todos os direitos reservados</p>

        <nav class="footer-links">
            <a href="index.html">Página inicial</a>
            <a href="login.html">Login</a>
            <a href="cadastro.html">Cadastro</a>
            <a href="#">Termos de uso</a>
            <a href="#">Política de privacidade</a>
            <a href="#">Declaração de acessibilidade</a>
            <a href="#">Suporte</a>
        </nav>
    </footer>

</body>
</html>
